CZĘŚĆ 1 – PODSTAWY AI I MICROSOFT FOUNDRY
Rozdział 1. Czym jest Artificial Intelligence (AI)?
Definicja

Artificial Intelligence (Sztuczna Inteligencja) to dziedzina informatyki zajmująca się tworzeniem systemów, które potrafią wykonywać zadania wymagające inteligencji człowieka.

Do takich zadań należą:

rozumienie tekstu,
prowadzenie rozmowy,
rozpoznawanie obrazów,
rozpoznawanie mowy,
tłumaczenie języków,
podejmowanie decyzji,
przewidywanie wyników,
generowanie nowych treści.

Dzisiejsza AI opiera się głównie na Machine Learning (ML) oraz Large Language Models (LLM), które uczą się zależności z ogromnych zbiorów danych.

Jak działa współczesna AI?

Proces można przedstawić w kilku krokach:

Model otrzymuje ogromną ilość danych (teksty, obrazy, dźwięki).
Uczy się wzorców występujących w tych danych.
Nie zapamiętuje wszystkiego dosłownie, lecz poznaje zależności.
Podczas pracy przewiduje najbardziej prawdopodobną odpowiedź.

Przykład:

Użytkownik wpisuje:

"Napisz mail do klienta."

Model:

rozpoznaje polecenie,
analizuje kontekst,
generuje nowy tekst.

Nie kopiuje gotowej wiadomości, lecz tworzy ją na podstawie wyuczonych wzorców.

Machine Learning

Machine Learning (uczenie maszynowe) jest poddziedziną AI.

Nie programujemy każdej reguły ręcznie.

Zamiast tego komputer:

analizuje dane,
znajduje zależności,
sam tworzy model.

Przykład:

Program ma rozpoznawać spam.

Stare podejście:

Jeżeli wiadomość zawiera słowo "FREE"
→ Spam

Machine Learning:

Pokazujemy milion wiadomości.

Model sam uczy się:

jakie słowa,
jakie układy zdań,
jakie cechy

oznaczają spam.

