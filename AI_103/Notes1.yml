Trade-off chart – wykres pokazujący kompromis między jakością, kosztem i wydajnością.
Side-by-side comparison – bezpośrednie porównanie modeli.

CZĘŚĆ 3 – WDRAŻANIE MODELI (DEPLOYMENT), PLAYGROUND I EWALUACJA MODELI

W tej części omówimy cały proces po wyborze modelu:

wdrożenie modelu (Deployment),
rodzaje endpointów,
testowanie w Playground,
ewaluację modeli (Evaluation),
metryki jakości i bezpieczeństwa. Materiał odpowiada sekcjom dotyczącym wdrażania i oceny modeli w Microsoft Foundry.
Rozdział 1. Co oznacza Deploy Model?

Deployment oznacza udostępnienie modelu w taki sposób, aby mogła korzystać z niego aplikacja.

Przed wdrożeniem model istnieje tylko w katalogu modeli.

Po wdrożeniu otrzymujemy:

Endpoint URL
nazwę deploymentu
klucz API lub możliwość logowania przez Microsoft Entra ID
możliwość wykonywania zapytań z poziomu aplikacji.
Proces wdrażania modelu

Schemat wygląda następująco:

Model Catalog
        ↓
Wybór modelu
        ↓
Deploy
        ↓
Endpoint
        ↓
Playground
        ↓
Aplikacja
Rodzaje Deploymentów

Microsoft Foundry oferuje kilka sposobów wdrażania modeli.

1. Global Standard

Najczęściej używany.

Cechy:

działa w dowolnym regionie Azure,
rozliczanie za liczbę tokenów,
największe limity (quota),
zalecany dla większości aplikacji.

Zastosowanie:

chatboty,
aplikacje webowe,
API.
2. Global Provisioned

Przeznaczony dla dużego ruchu.

Płacimy za zarezerwowaną przepustowość (PTU – Provisioned Throughput Units).

Zalety:

przewidywalna wydajność,
stabilne czasy odpowiedzi.
3. Global Batch

Do dużych zadań wykonywanych asynchronicznie.

Przykłady:

analiza milionów dokumentów,
generowanie raportów.

Zaleta:

około 50% niższy koszt niż standardowe wywołania.
4. Data Zone Standard

Dane pozostają w określonej strefie (np. UE lub USA).

Stosowane, gdy wymagają tego przepisy dotyczące przechowywania danych.

5. Data Zone Provisioned

Łączy:

rezerwowaną przepustowość,
wymóg przechowywania danych w konkretnej strefie.
6. Data Zone Batch

Batch z zachowaniem lokalizacji danych.

7. Regional Standard

Model działa wyłącznie w jednym regionie Azure.

Przykład:

tylko West Europe.
8. Regional Provisioned

Jak wyżej, ale z rezerwowaną przepustowością.

9. Developer Deployment

Przeznaczony głównie do:

testów,
oceny modeli po fine-tuningu.

Nie jest zalecany do środowiska produkcyjnego.

Jak wdrożyć model?

Proces jest prosty:

Krok 1

Model Catalog

↓

wybieramy model.

Krok 2

Klikamy:

Deploy

Krok 3

Wybieramy:

ustawienia domyślne (Default),
lub
ustawienia własne (Custom).
Krok 4

Jeżeli model pochodzi od partnera (np. Meta, Anthropic), należy zaakceptować warunki licencji.

Krok 5

Konfigurujemy:

nazwę deploymentu,
typ deploymentu,
maszynę wirtualną (jeśli dotyczy),
liczbę instancji.
Krok 6

Klikamy:

Deploy

↓

Po kilku minutach model jest gotowy.

Zarządzanie Deploymentami

Po wdrożeniu możemy zobaczyć:

status deploymentu,
adres endpointu,
klucze API,
wykorzystanie,
metryki,
konfigurację.

Można również:

usunąć deployment,
zmienić konfigurację.
Endpoint

Każdy deployment posiada własny endpoint.

Endpoint jest adresem URL, pod który aplikacja wysyła zapytania.

Przykład działania:

Aplikacja
      ↓
Endpoint
      ↓
Model
      ↓
Odpowiedź

Do połączenia potrzebne są:

Endpoint URL,
Authentication Key lub Microsoft Entra ID,
Deployment Name.
Playground

Po wdrożeniu model można natychmiast przetestować.

Playground jest interaktywnym środowiskiem testowym.

Nie trzeba pisać kodu.

Można:

wpisywać prompty,
analizować odpowiedzi,
zmieniać parametry,
eksperymentować z instrukcjami systemowymi,
kopiować przykładowy kod do aplikacji.
Co testować w Playground?

Microsoft zaleca sprawdzić:

Proste pytania

Czy model odpowiada poprawnie?

Trudne zadania

Czy potrafi rozwiązywać problemy wieloetapowe?

Nietypowe przypadki

Czy model zachowuje się poprawnie przy nietypowych danych?

Styl odpowiedzi

Czy odpowiada zgodnie z oczekiwaniami?

Parametry modelu

Najważniejsze ustawienia:

Temperature

Kontroluje kreatywność.

0

↓

odpowiedzi przewidywalne

1

↓

bardziej kreatywne

2

↓

bardzo losowe

Max Tokens

Maksymalna długość odpowiedzi.

Top-p

Alternatywny sposób sterowania losowością odpowiedzi.

Kod w Playground

Playground potrafi automatycznie wygenerować kod dla:

Python,
C#,
JavaScript.

Kod zawiera już:

endpoint,
nazwę modelu,
sposób uwierzytelnienia.
Rozdział 2. Ewaluacja modeli (Evaluation)

Samo wdrożenie modelu nie oznacza, że jest on gotowy do użycia.

Model trzeba ocenić.

Dlaczego?

sprawdzenie jakości,
wykrycie błędów,
poprawa odpowiedzi,
bezpieczeństwo,
zgodność z wymaganiami firmy.
Cele ewaluacji
Quality Assurance

Czy model odpowiada poprawnie?

User Satisfaction

Czy użytkownicy są zadowoleni?

Continuous Improvement

Czy po zmianach model działa lepiej?

Compliance

Czy model spełnia wymagania bezpieczeństwa i ochrony danych?

Manual Evaluation

Ocena wykonywana przez człowieka.

Tester wpisuje prompty i ocenia odpowiedzi.

Najczęściej ocenia się:

poprawność,
przydatność,
styl,
bezpieczeństwo,
zgodność z instrukcjami.

To najbardziej wartościowy sposób wykrywania problemów jakościowych.

Kryteria oceny odpowiedzi

Microsoft proponuje ocenę w skali (np. 1–5) według:

Relevance

Czy odpowiedź odpowiada na pytanie?

Informativeness

Czy zawiera wystarczającą ilość informacji?

Engagement

Czy odpowiedź jest naturalna i angażująca?

Accuracy

Czy informacje są poprawne?

Safety

Czy odpowiedź nie zawiera szkodliwych treści?

User Studies

Najbardziej wiarygodna metoda.

Polega na przekazaniu aplikacji prawdziwym użytkownikom.

Ich opinie pomagają wykryć problemy, których nie widać podczas testów technicznych.

Automated Evaluation

Ocena wykonywana automatycznie.

Microsoft Foundry analizuje odpowiedzi przy pomocy gotowych metryk.

Metryki jakości
Groundedness

Czy odpowiedź opiera się na dostarczonych danych?

Przykład:

Model otrzymał dokument.

Jeżeli odpowiada zgodnie z dokumentem,

Groundedness jest wysoki.

Jeżeli wymyśla informacje,

Groundedness jest niski.

Relevance

Czy odpowiedź dotyczy pytania?

Coherence

Czy odpowiedź jest logiczna?

Fluency

Czy język jest naturalny?

Metryki bezpieczeństwa

Microsoft automatycznie wykrywa:

Self-harm,
Hate Speech,
Violence,
Sexual Content,
Copyright,
Jailbreak.

Dla tych metryk obliczany jest Defect Rate – procent odpowiedzi przekraczających ustalony próg zagrożenia. Im niższy wynik, tym lepiej.

NLP Metrics

Jeżeli mamy poprawne odpowiedzi referencyjne (ground truth), można użyć klasycznych metryk NLP:

F1-score

Łączy precyzję i kompletność.

BLEU

Porównuje wygenerowany tekst z tekstem wzorcowym. Popularny w tłumaczeniach.

METEOR

Rozszerzenie BLEU uwzględniające synonimy i parafrazy.

ROUGE

Najczęściej stosowany do oceny streszczeń – sprawdza, czy uwzględniono najważniejsze informacje.

GLEU

Odmiana BLEU przeznaczona do oceny pojedynczych zdań.

Evaluation Flow

Microsoft Foundry umożliwia kompleksową ocenę modelu.

Można ocenić:

model,
agenta,
gotowy zestaw odpowiedzi (dataset).

Źródła danych testowych:

własny plik CSV,
plik JSONL,
wcześniej zapisany dataset,
syntetycznie wygenerowany zbiór danych.

Po uruchomieniu ewaluacji system oblicza wszystkie wybrane metryki i prezentuje wyniki zbiorcze oraz szczegóły dla każdego testowego przypadku.

Co zrobić po ewaluacji?

Jeśli wyniki są słabe, Microsoft sugeruje:

poprawić prompt (Prompt Engineering),
wybrać lepszy model,
zastosować RAG,
przeprowadzić Fine-tuning (jeśli model to wspiera).

Jeżeli problem dotyczy bezpieczeństwa:

zastosować Azure AI Content Safety,
dodać instrukcje bezpieczeństwa do system promptu,
sprawdzać odpowiedzi przed pokazaniem ich użytkownikowi. Regularne ponawianie ewaluacji pozwala śledzić poprawę jakości i wykrywać regresję.
📌 Najważniejsze rzeczy do zapamiętania z Części 3
Deployment
Deploy = udostępnienie modelu aplikacji.
Po wdrożeniu otrzymujemy:
Endpoint URL,
Deployment Name,
Authentication Key lub Microsoft Entra ID.
Najważniejsze deploymenty
Typ	Charakterystyka
Global Standard	domyślny, płatność za tokeny
Provisioned	zarezerwowana przepustowość (PTU)
Batch	zadania asynchroniczne, niższy koszt
Data Zone	dane pozostają w określonej strefie
Regional	wdrożenie w jednym regionie
Playground

Służy do:

testowania promptów,
zmiany parametrów (Temperature, Max Tokens, Top-p),
generowania przykładowego kodu.
Evaluation

Rodzaje:

Manual Evaluation – ocena przez człowieka,
Automated Evaluation – automatyczne metryki.
Najważniejsze metryki
Metryka	Znaczenie
Groundedness	odpowiedź oparta na dostarczonych danych
Relevance	zgodność z pytaniem
Coherence	spójność odpowiedzi
Fluency	naturalność języka
F1-score	precyzja i kompletność
BLEU	jakość tłumaczeń
ROUGE	jakość streszczeń
METEOR	podobieństwo z uwzględnieniem synonimów
GLEU	ocena zdań

CZĘŚĆ 4 – MICROSOFT FOUNDRY SDK, OPENAI SDK, ENDPOINTY I UWIERZYTELNIANIE

Ta część opisuje, jak programista łączy swoją aplikację z Microsoft Foundry. To jeden z najważniejszych rozdziałów, ponieważ wyjaśnia różnice między Foundry SDK, OpenAI SDK, endpointami oraz sposobami uwierzytelniania.

Rozdział 1. Jak wygląda tworzenie aplikacji AI?

Po wybraniu modelu i jego wdrożeniu następuje etap tworzenia aplikacji.

Microsoft proponuje następujący proces:

Model
     ↓
Playground
     ↓
Testowanie Promptów
     ↓
Generowanie kodu
     ↓
Programowanie aplikacji
     ↓
Testy
     ↓
Produkcja

Najpierw testujemy model w Playground, a dopiero później piszemy kod. Dzięki temu łatwiej dobrać odpowiedni prompt i parametry modelu.

Model Playground

Model Playground to środowisko testowe dostępne w Microsoft Foundry.

Pozwala bez programowania:

zadawać pytania modelowi,
zmieniać parametry,
testować różne modele,
porównywać odpowiedzi,
generować gotowy kod.
Co można zmieniać?

Najważniejsze ustawienia:

Temperature

Steruje kreatywnością modelu.

Wartość	Efekt
0	odpowiedzi bardzo przewidywalne
0.3	niewielka kreatywność
0.7	dobra równowaga
1	bardzo kreatywne odpowiedzi
Max Tokens

Określa maksymalną długość odpowiedzi.

System Message

Instrukcja dla modelu.

Przykład:

"Jesteś nauczycielem informatyki."

Od tej chwili model odpowiada zgodnie z tą rolą.

Code Generator

Jedna z najlepszych funkcji Playground.

Po kliknięciu Code Microsoft automatycznie generuje kod dla:

Python
C#
JavaScript

Kod zawiera:

endpoint,
nazwę modelu,
sposób logowania,
przykładowe wywołanie API.
Typowy workflow programisty

Microsoft zaleca następującą kolejność:

Testowanie promptów.
Dopracowanie parametrów.
Wygenerowanie kodu.
Rozbudowa aplikacji.
Powrót do Playground w celu kolejnych testów.
Ponowne wdrożenie.

To znacznie skraca czas tworzenia aplikacji.

Rozdział 2. Endpointy

Każdy projekt Microsoft Foundry posiada dwa endpointy.

1. Project Endpoint

Obsługuje funkcje specyficzne dla Foundry.

Przykładowy adres:

https://resource.services.ai.azure.com/api/projects/project-name

Pozwala korzystać z:

agentów,
projektów,
danych,
narzędzi,
ewaluacji,
połączeń MCP,
Foundry IQ.
2. Azure OpenAI Endpoint

Przykładowy adres:

https://resource.openai.azure.com/openai/v1

Służy głównie do:

wykonywania zapytań do modeli,
korzystania z OpenAI SDK,
Responses API,
Chat Completions API.

Jest zgodny z API OpenAI, co ułatwia przenoszenie istniejących aplikacji.

Różnice między endpointami
Project Endpoint	Azure OpenAI Endpoint
Foundry SDK	OpenAI SDK
Agenci	Modele
Projekty	Chat
Ewaluacja	Responses API
Tracing	Chat Completions
Dane projektu	Image Generation
Rozdział 3. SDK

SDK (Software Development Kit) to biblioteka ułatwiająca korzystanie z API.

Microsoft wspiera dwa główne SDK.

Microsoft Foundry SDK

To oficjalne SDK Microsoft Foundry.

Obsługuje:

Python,
.NET,
JavaScript.

Najważniejsza klasa:

AIProjectClient

Pozwala:

łączyć się z projektem,
zarządzać agentami,
pobierać konfigurację,
korzystać z połączeń,
uruchamiać ewaluacje,
korzystać z narzędzi Foundry.
Instalacja Foundry SDK

Python:

pip install azure-ai-projects

Dodatkowo:

pip install azure-identity

oraz

pip install openai

Biblioteka openai jest nadal potrzebna, ponieważ klient czatu Foundry korzysta z mechanizmów OpenAI SDK.

AIProjectClient

Najważniejszy obiekt Foundry SDK.

Pozwala:

pobierać konfigurację,
zarządzać projektem,
korzystać z połączeń,
uzyskać klienta OpenAI.

Schemat:

Project Endpoint
        ↓
AIProjectClient
        ↓
OpenAI Client
        ↓
Model
get_openai_client()

Najważniejsza metoda.

Tworzy klienta zgodnego z OpenAI.

Od tego momentu można korzystać z:

Responses API,
Chat Completions,
modeli GPT.
OpenAI SDK

Drugie rozwiązanie.

To oficjalna biblioteka OpenAI.

Obsługuje:

OpenAI,
Azure OpenAI,
Microsoft Foundry.

Instalacja:

pip install openai

Najważniejsza klasa:

OpenAI()

Jej zadaniem jest wysyłanie zapytań do modeli.

Uwierzytelnianie (Authentication)

Microsoft umożliwia kilka metod logowania.

1. Microsoft Entra ID ⭐ (zalecane)

Najbezpieczniejsze rozwiązanie.

Aplikacja loguje się za pomocą tożsamości Azure.

Zalety:

brak kluczy w kodzie,
większe bezpieczeństwo,
zalecane dla środowiska produkcyjnego.
2. API Key

Najprostsza metoda.

Aplikacja używa klucza API.

Schemat:

Program
      ↓
API Key
      ↓
Endpoint

Wady:

trzeba chronić klucz,
nie powinien znajdować się bezpośrednio w kodzie.

Microsoft zaleca przechowywanie kluczy w Azure Key Vault.

3. Environment Variables

Klucz zapisujemy w zmiennych środowiskowych.

Przykład:

OPENAI_API_KEY

Program odczytuje go automatycznie.

To bezpieczniejsze rozwiązanie niż wpisywanie klucza w kodzie.

Co robi OpenAI Client?

OpenAI Client odpowiada za:

Responses API,
Chat Completions,
Image Generation,
Foundry Models,
wysyłanie promptów.
AzureOpenAI Client

Specjalna wersja klienta.

Używana, gdy potrzebna jest konkretna wersja Azure OpenAI API.

Najważniejszy parametr:

api_version
Foundry SDK vs OpenAI SDK

To jedno z najczęściej zadawanych pytań.

Foundry SDK	OpenAI SDK
Zarządza projektami	Rozmawia z modelami
Obsługuje agentów	Obsługuje GPT
Ewaluacja	Responses API
Tracing	Chat Completions
MCP	Image API
Foundry IQ	Maksymalna zgodność z OpenAI
Kiedy używać Foundry SDK?

Jeżeli potrzebujesz:

Agent Service,
MCP,
Foundry IQ,
Tracing,
Cloud Evaluation,
zarządzania projektem,
połączeń.
Kiedy używać OpenAI SDK?

Jeżeli aplikacja ma tylko:

wysyłać prompty,
odbierać odpowiedzi,
korzystać z GPT,
generować obrazy,
być zgodna z OpenAI API.
Czy można używać obu jednocześnie?

Tak.

To bardzo częste rozwiązanie.

Przykład:

Foundry SDK
        ↓
Zarządzanie agentem

OpenAI SDK
        ↓
Rozmowa z GPT

Microsoft zaleca takie podejście w bardziej rozbudowanych projektach.

📌 Najważniejsze rzeczy do zapamiętania z Części 4
Dwa endpointy
Endpoint	Zastosowanie
Project Endpoint	projekty, agenci, narzędzia, ewaluacja
Azure OpenAI Endpoint	modele, Responses API, Chat Completions
Dwa SDK
SDK	Do czego służy?
Foundry SDK	zarządzanie projektami i funkcjami Foundry
OpenAI SDK	komunikacja z modelami AI
Metody uwierzytelniania
⭐ Microsoft Entra ID (zalecane)
API Key
Environment Variables
Najważniejsze klasy
AIProjectClient – główny klient Foundry.
OpenAI – klient do komunikacji z modelami.
AzureOpenAI – klient dla określonych wersji Azure OpenAI API.
Co warto zapamiętać na egzamin?
Project Endpoint służy do funkcji specyficznych dla Foundry (agenci, projekty, narzędzia).
Azure OpenAI Endpoint służy do wywoływania modeli zgodnych z API OpenAI.
Foundry SDK wybieramy, gdy potrzebujemy agentów, ewaluacji, MCP lub zarządzania projektem.
OpenAI SDK wybieramy, gdy zależy nam na prostym korzystaniu z modeli i zgodności z OpenAI API.
W środowisku produkcyjnym preferowaną metodą uwierzytelniania jest Microsoft Entra ID, a nie klucze API.

CZĘŚĆ 5 – RESPONSES API (NAJWAŻNIEJSZE API MICROSOFT FOUNDRY)

Ta część jest jedną z najważniejszych w całym kursie. Microsoft zaleca, aby w nowych projektach używać Responses API zamiast ChatCompletions API. Responses API łączy możliwości starszego ChatCompletions API oraz Assistants API i upraszcza tworzenie aplikacji konwersacyjnych.

Rozdział 1. Czym jest Responses API?

Responses API to nowoczesny interfejs komunikacji z modelami AI.

Jego zadaniem jest:

wysyłanie promptów,
odbieranie odpowiedzi,
prowadzenie rozmów,
zapamiętywanie kontekstu,
obsługa różnych modeli.

Microsoft rekomenduje używanie go we wszystkich nowych aplikacjach.

Dlaczego powstało Responses API?

Wcześniej istniały dwa oddzielne API:

ChatCompletions API
Assistants API

Każde miało inne możliwości.

Responses API łączy je w jedno rozwiązanie.

Zalety Responses API
1. Stateful Conversations

Model pamięta historię rozmowy.

Nie trzeba za każdym razem przesyłać całej konwersacji.

2. Unified API

Jedno API obsługuje większość scenariuszy.

3. Foundry Models

Działa nie tylko z GPT.

Obsługuje także:

Phi
DeepSeek
Mistral
Llama
inne modele Foundry.
4. Prostsza integracja

Jedna metoda obsługuje większość zastosowań.

Schemat działania
Program
     ↓
Responses API
     ↓
Model AI
     ↓
Response Object
     ↓
Program
Rozdział 2. Tworzenie odpowiedzi

Najważniejsza metoda:

responses.create()

To właśnie ona wysyła prompt do modelu.

Przykład:

response = client.responses.create(
    model="gpt-4.1",
    input="What is AI?"
)

Następnie odpowiedź odczytujemy z:

response.output_text

Parametr model

Określa, który deployment zostanie użyty.

Przykłady:

gpt-4.1
gpt-4o
microsoft-phi-4
llama
Parametr input

To prompt użytkownika.

Przykład:

Explain Machine Learning.
Response Object

Odpowiedź modelu zawiera znacznie więcej niż sam tekst.

Najważniejsze pola:

Pole	Znaczenie
output_text	odpowiedź modelu
id	identyfikator odpowiedzi
status	status wykonania
usage	liczba tokenów
model	wykorzystany model

Rozdział 3. Instructions (System Prompt)

Model można odpowiednio "ustawić".

Służy do tego parametr:

instructions

Przykład:

You are a helpful teacher.

Od tej chwili model odpowiada jak nauczyciel.

Dlaczego Instructions są ważne?

Bez instrukcji:

Wyjaśnij SQL.

Model odpowie dowolnym stylem.

Z instrukcją:

Jesteś profesorem informatyki.

Odpowiedź będzie:

bardziej techniczna,
uporządkowana,
zgodna z rolą.

Rozdział 4. Sterowanie odpowiedzią

Responses API posiada wiele parametrów.

Najważniejsze:

Temperature

Steruje losowością.

Temperature	Efekt
0	odpowiedzi przewidywalne
0.2	niewielka kreatywność
0.7	kompromis
1.5	bardzo kreatywne
max_output_tokens

Ogranicza długość odpowiedzi.

Przykład:

200 tokenów

↓

maksymalnie około 150 słów.

top_p

Alternatywa dla Temperature.

Również steruje różnorodnością odpowiedzi.

Microsoft zaleca zwykle zmieniać Temperature lub top_p, a nie oba jednocześnie.

Rozdział 5. Foundry Direct Models

Responses API działa nie tylko z GPT.

Można używać:

Phi
DeepSeek
Llama
Mistral
innych modeli z katalogu Foundry.

Zmienia się jedynie parametr:

model=

Cały kod pozostaje praktycznie taki sam.

Rozdział 6. Rozmowy wieloetapowe

Największa zaleta Responses API.

Model pamięta wcześniejsze odpowiedzi.

Przykład:

Użytkownik:

Co to jest Machine Learning?

Model odpowiada.

Następnie użytkownik:

Podaj przykład.

Model wie, że chodzi o Machine Learning.

Nie trzeba ponownie pisać całego pytania.

previous_response_id

To najważniejszy parametr rozmów.

Schemat:

Prompt 1
      ↓
Response 1
      ↓
ID odpowiedzi
      ↓
Prompt 2
      ↓
previous_response_id
      ↓
Model pamięta kontekst
Jak wygląda rozmowa?

Pierwsze pytanie:

What is Machine Learning?

↓

Model odpowiada.

Drugie pytanie:

Can you give me an example?

Do zapytania dołączany jest:

previous_response_id

Dzięki temu model rozumie, czego dotyczy rozmowa.

Chat Loop

Typowa aplikacja działa w pętli.

Schemat:

Użytkownik
      ↓
Prompt
      ↓
Responses API
      ↓
Odpowiedź
      ↓
Zapamiętanie response_id
      ↓
Nowe pytanie

Program cały czas zapisuje ostatni response_id.

Rozdział 7. Manual Conversation History

Niektórzy programiści wolą sami przechowywać historię rozmowy.

Tworzą wtedy listę:

User

↓

Assistant

↓

User

↓

Assistant

↓

User

Cała historia jest wysyłana przy każdym kolejnym zapytaniu.

Zalety:

pełna kontrola,
możliwość usuwania starych wiadomości,
zapis do bazy danych,
łatwe przywracanie rozmowy.

Wady:

większa liczba tokenów,
wyższy koszt.
Pobieranie wcześniejszych odpowiedzi

Responses API umożliwia odczyt wcześniejszej odpowiedzi po jej identyfikatorze (response_id).

Może to być przydatne do:

debugowania,
audytu,
ponownego wykorzystania odpowiedzi.
Context Window

Każdy model posiada ograniczoną pamięć.

Do jednego zapytania trafiają:

System Prompt,
aktualne pytanie,
historia rozmowy,
definicje narzędzi,
wyniki narzędzi,
dokumenty z RAG,
pamięć.

Wszystko to zamieniane jest na tokeny.

Im więcej tokenów,

tym:

większy koszt,
dłuższy czas odpowiedzi.

Dlatego historię rozmowy warto okresowo skracać.

Rozdział 8. Streaming

Normalnie:

Program czeka.

↓

Model kończy odpowiedź.

↓

Wyświetla całość.

Streaming działa inaczej.

Model wysyła odpowiedź kawałek po kawałku.

Przykład:

Artificial...
Artificial Intelligence...
Artificial Intelligence is...

Użytkownik widzi tekst natychmiast.

To poprawia wrażenia z korzystania z aplikacji.

Zalety streamingu

✔ szybsza reakcja interfejsu,

✔ lepsze doświadczenie użytkownika,

✔ możliwość wyświetlania odpowiedzi "na żywo".

Rozdział 9. Async

Standardowo:

Program czeka na odpowiedź.

To wywołanie synchroniczne.

Async działa inaczej.

Program może wykonywać inne zadania podczas oczekiwania.

Schemat:

Zapytanie

↓

Program robi inne rzeczy

↓

Model kończy odpowiedź

↓

Program odbiera wynik
Kiedy używać Async?

Przy:

wielu użytkownikach,
serwerach,
aplikacjach webowych,
chatbotach,
długich odpowiedziach.

Asynchroniczny klient (AsyncOpenAI) umożliwia także strumieniowanie odpowiedzi.

