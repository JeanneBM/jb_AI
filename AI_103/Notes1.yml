⭐ Szybka ściąga (10 najważniejszych faktów)
Microsoft Foundry to platforma do tworzenia aplikacji AI na Azure.
LLM służą do zaawansowanego rozumowania i generowania treści, SLM są szybsze i tańsze.
AI Agent = model + instrukcje + narzędzia + wiedza + pamięć.
Modele wybieramy na podstawie Quality, Safety, Cost i Performance.
Po wdrożeniu (Deployment) otrzymujemy Endpoint URL, nazwę deploymentu oraz sposób uwierzytelniania.
Playground służy do testowania modeli bez pisania kodu.
Responses API jest zalecane do nowych projektów; ChatCompletions API pozostaje ważne dla zgodności ze starszymi aplikacjami.
W środowisku produkcyjnym preferowaną metodą uwierzytelniania jest Microsoft Entra ID.
Ewaluacja modeli może być manualna lub automatyczna i wykorzystuje metryki jakości oraz bezpieczeństwa.
Odpowiedzialne AI opiera się na sześciu zasadach: Fairness, Reliability & Safety, Privacy & Security, Inclusiveness, Transparency i Accountability.

