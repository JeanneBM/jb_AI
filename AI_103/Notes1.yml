Rozdział 2. Benchmarki modeli

Benchmark to obiektywny test porównujący modele AI.

Microsoft Foundry porównuje modele w czterech głównych obszarach:

Quality
Safety
Cost
Performance
QUALITY

Ocena jakości odpowiedzi.

Sprawdzane są:

poprawność,
wiedza,
rozumowanie,
kodowanie,
matematyka,
wykonywanie instrukcji.

Najważniejszy wskaźnik:

Quality Index

Średnia z wielu benchmarków.

Im wyższy wynik,

tym lepszy model.

Najważniejsze benchmarki
Arena-Hard

Bardzo trudne pytania.

BIG Bench Hard

Logiczne rozumowanie.

GPQA

Pytania akademickie.

HumanEval+

Programowanie.

MBPP+

Kodowanie.

MATH

Matematyka.

MMLU-Pro

Wiedza ogólna.

IFEval

Wykonywanie instrukcji.

Wszystkie wyniki są normalizowane od 0 do 1.

Im bliżej 1,

tym lepiej.

SAFETY

Ocena bezpieczeństwa.

Sprawdza:

czy model generuje szkodliwe treści,
czy można go łatwo oszukać,
czy przestrzega zasad.
HarmBench

Sprawdza:

cyberprzestępczość,
nielegalne działania,
przemoc,
dezinformację,
nękanie,
naruszenia praw autorskich.

Miernik:

Attack Success Rate (ASR)

Im niższy, tym bezpieczniejszy model.

ToxiGen

Ocena wykrywania mowy nienawiści.

Wyższy wynik F1 = lepiej.

WMDP

Sprawdza wiedzę dotyczącą:

broni biologicznej,
chemicznej,
cyberbezpieczeństwa.

Im większa wiedza modelu,

tym większe potencjalne ryzyko.

COST

Koszty działania modelu.

Microsoft pokazuje:

Input Tokens

Cena za milion tokenów wejściowych.

Output Tokens

Cena za milion tokenów odpowiedzi.

Estimated Cost

Szacowany koszt całkowity.

Uwzględnia typowy stosunek:

3 tokeny wejściowe

↓

1 token wyjściowy.

Im niższy koszt,

tym tańszy model.

PERFORMANCE

Ocena szybkości.

Najważniejsze parametry:

Latency Mean

Średni czas odpowiedzi.

P50

Mediana.

P90

90% odpowiedzi szybszych od tej wartości.

P95

95%.

P99

99%.

TTFT

Time To First Token.

Jak szybko pojawia się pierwszy znak odpowiedzi.

Im mniejszy,

tym lepiej.

GTPS

Generated Tokens Per Second.

Ile tokenów generuje model na sekundę.

Więcej = lepiej.

TTPS

Total Tokens Per Second.

Łączna przepustowość.

Time Between Tokens

Przerwa pomiędzy kolejnymi tokenami.

Im mniejsza,

tym płynniejsza odpowiedź.

Leaderboards

Foundry umożliwia ranking modeli.

Można sortować według:

jakości,
kosztów,
bezpieczeństwa,
szybkości.
