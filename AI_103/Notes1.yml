Natural Language Processing (NLP)

NLP oznacza przetwarzanie języka naturalnego.

Pozwala komputerowi rozumieć tekst pisany przez człowieka.

Typowe zadania:

klasyfikacja tekstu,
analiza sentymentu,
wykrywanie języka,
streszczanie,
rozpoznawanie encji,
odpowiadanie na pytania.
Przykład

Tekst:

"Telefon jest świetny, ale bateria szybko się rozładowuje."

Analiza sentymentu:

Pozytywne:

✔ telefon

Negatywne:

✔ bateria

Computer Speech

To technologia związana z mową.

Obejmuje:

Speech to Text (STT)

Mowa → tekst

Przykład:

Dyktowanie wiadomości.

Text to Speech (TTS)

Tekst → mowa

Przykład:

Czytnik ekranu.

Rozpoznawanie mówcy

System potrafi rozpoznać osobę po głosie.

Tłumaczenie rozmów

Przykład:

Polak mówi po polsku.

Francuz słyszy po francusku.

