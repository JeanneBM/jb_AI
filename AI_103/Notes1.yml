Rozdział 4. Responsible AI (Odpowiedzialna AI)

Microsoft definiuje sześć podstawowych zasad odpowiedzialnego projektowania systemów AI.

Fairness (Sprawiedliwość) – model nie powinien dyskryminować użytkowników.
Reliability & Safety (Niezawodność i bezpieczeństwo) – modele muszą być dokładnie testowane i działać przewidywalnie.
Privacy & Security (Prywatność i bezpieczeństwo danych) – należy chronić dane użytkowników i odpowiednio je zabezpieczać.
Inclusiveness (Dostępność i inkluzywność) – rozwiązania powinny być użyteczne dla wszystkich użytkowników, niezależnie od ich możliwości czy pochodzenia.
Transparency (Przejrzystość) – użytkownik powinien wiedzieć, że korzysta z AI, rozumieć jego możliwości i ograniczenia.
Accountability (Odpowiedzialność) – za działanie systemu AI odpowiadają ludzie: projektanci, programiści i organizacja wdrażająca rozwiązanie.
📌 Najważniejsze rzeczy do zapamiętania z Części 1
AI wykorzystuje głównie Machine Learning i Large Language Models (LLM).
Generative AI tworzy nowe treści (tekst, obrazy, kod, filmy).
AI Agent = LLM + instrukcje + narzędzia + pamięć + wykonywanie zadań.
Główne obszary AI: NLP, Computer Speech, Computer Vision, Information Extraction.
Microsoft Foundry jest platformą do budowy aplikacji AI na Azure.
Projekt Foundry zawiera Models, Agents, Tools i Knowledge.
Foundry Tools obejmują m.in. Azure Language, Speech, Translator, Document Intelligence i Content Understanding.
Odpowiedzialne AI opiera się na 6 zasadach: Fairness, Reliability & Safety, Privacy & Security, Inclusiveness, Transparency, Accountability.

