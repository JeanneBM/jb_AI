ChatCompletions vs Responses API

To najważniejsze porównanie w całym kursie.

ChatCompletions	Responses API
Starsze API	Nowoczesne API
Historia przekazywana ręcznie	Historia utrzymywana przez previous_response_id
Mniej funkcji	Więcej funkcji
Bardzo kompatybilne	Zalecane przez Microsoft
Nadal wspierane	Preferowane w nowych projektach

Najważniejszy wniosek:

Nowe aplikacje → Responses API.

Starsze aplikacje → ChatCompletions może pozostać.

Responses API – zalety

Microsoft wskazuje kilka powodów, dla których warto korzystać z Responses API:

Prostszy kod

Mniej ręcznego zarządzania historią.

Lepsza obsługa kontekstu

Nie trzeba każdorazowo budować listy wiadomości.

Jedno API

Łączy możliwości:

ChatCompletions,
Assistants API.
Obsługa większej liczby modeli

Działa z:

GPT,
Phi,
DeepSeek,
Llama,
Mistral.
Kiedy używać ChatCompletions?

Przede wszystkim gdy:

utrzymujesz starszy projekt,
korzystasz z gotowego kodu,
potrzebujesz maksymalnej kompatybilności.
Kiedy używać Responses API?

Prawie zawsze w nowych aplikacjach.

Microsoft wyraźnie rekomenduje właśnie to API.

