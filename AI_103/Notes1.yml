To ostatnia część opracowania. Obejmuje ChatCompletions API, porównanie z Responses API oraz najważniejsze informacje z całego kursu w formie powtórki. Materiał odpowiada końcowej części przesłanego pliku dotyczącej komunikacji z modelami.

Rozdział 1. Czym jest ChatCompletions API?

ChatCompletions API to starszy interfejs komunikacji z modelami AI.

Przez wiele lat był podstawowym sposobem tworzenia chatbotów.

Obecnie:

nadal jest wspierany,
nadal działa,
jest bardzo popularny,

ale Microsoft zaleca używanie Responses API w nowych projektach.

