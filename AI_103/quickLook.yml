Te 6 zasad Responsible AI bardzo często pojawia się na AI-103. Najłatwiej zapamiętać je na prostych przykładach.

1. Fairness (Sprawiedliwość) ⚖️

Co oznacza?
AI powinno traktować wszystkich ludzi tak samo i nie dyskryminować nikogo.

Przykład:

Bank używa AI do przyznawania kredytów.

❌ Źle:

odrzuca kobiety częściej niż mężczyzn,
odrzuca osoby z określonego kraju,
faworyzuje jedną grupę ludzi.

✅ Dobrze:

decyzja zależy tylko od dochodów, historii kredytowej itd., a nie od płci czy pochodzenia.

Zapamiętaj:

Fairness = brak dyskryminacji.

2. Reliability & Safety (Niezawodność i bezpieczeństwo) 🛡️

Co oznacza?
AI powinno działać poprawnie, stabilnie i nie stwarzać zagrożenia.

Przykład:

AI pomaga lekarzowi wykrywać raka.

❌ Źle:

często się myli,
działa tylko czasami,
daje przypadkowe odpowiedzi.

✅ Dobrze:

jest dokładnie przetestowane,
działa przewidywalnie,
nie podejmuje ryzykownych decyzji bez kontroli.

Zapamiętaj:

Reliability & Safety = AI działa poprawnie i bezpiecznie.

3. Privacy & Security (Prywatność i bezpieczeństwo danych) 🔒

Co oznacza?
AI musi chronić dane użytkowników.

Przykład:

Chatbot zna Twój:

PESEL,
adres,
numer telefonu,
e-mail.

❌ Źle:
pokazuje te dane każdemu.

✅ Dobrze:
przechowuje dane bezpiecznie i pokazuje je tylko uprawnionym osobom.

Zapamiętaj:

Privacy = ochrona danych osobowych.

4. Inclusiveness (Dostępność dla wszystkich) 🌍

Co oznacza?
AI powinno być użyteczne dla każdego.

Przykład:

Osoba:

niewidoma,
niesłysząca,
starsza,
z niepełnosprawnością

powinna móc korzystać z aplikacji.

Przykłady:

napisy do filmów,
czytnik ekranu,
obsługa wielu języków,
możliwość sterowania głosem.

Zapamiętaj:

Inclusiveness = AI dla wszystkich.

5. Transparency (Przejrzystość) 👁️

Co oznacza?
Użytkownik powinien wiedzieć:

że rozmawia z AI,
jak AI działa,
jakie ma ograniczenia.
Przykład

❌ Źle:
AI udaje człowieka.

✅ Dobrze:
Aplikacja informuje:

"Rozmawiasz z asystentem AI."

lub

"Odpowiedź została wygenerowana przez sztuczną inteligencję."

Czasami AI pokazuje też pewność odpowiedzi (confidence score).

Zapamiętaj:

Transparency = użytkownik wie, że korzysta z AI.

6. Accountability (Odpowiedzialność) 👨‍💼

Co oznacza?
Za decyzje AI zawsze odpowiada człowiek lub firma.

Nie można powiedzieć:

"To AI zrobiło błąd."

Odpowiedzialny jest twórca systemu.

Przykład

Firma stworzyła AI do diagnozowania chorób.

Jeśli AI popełni błąd:

❌ nie odpowiada komputer,

✅ odpowiada firma i osoby, które stworzyły system.

Zapamiętaj:

Accountability = człowiek odpowiada za AI.

Szybka ściąga na egzamin
Zasada	Zapamiętaj jednym zdaniem
⚖️ Fairness	Nie dyskryminuje ludzi.
🛡️ Reliability & Safety	Działa poprawnie i bezpiecznie.
🔒 Privacy & Security	Chroni dane użytkowników.
🌍 Inclusiveness	Jest dostępne dla wszystkich.
👁️ Transparency	Użytkownik wie, że korzysta z AI i zna jego ograniczenia.
👨‍💼 Accountability	Za AI odpowiada człowiek lub organizacja.
Mnemotechnika

Możesz zapamiętać skrót FRPITA:

F – Fairness
R – Reliability & Safety
P – Privacy & Security
I – Inclusiveness
T – Transparency
A – Accountability

Na AI-103 często pojawiają się pytania typu „Która zasada Responsible AI dotyczy ochrony danych?” albo „Która zasada oznacza, że użytkownik powinien wiedzieć, że rozmawia z AI?”. Jeśli zapamiętasz powyższe skojarzenia, takie pytania są bardzo łatwe.

„Która zasada oznacza, że użytkownik powinien wiedzieć, że rozmawia z AI Transparency

Dokładnie! ✅

Jeśli na AI-103 zobaczysz pytanie:

"Która zasada Responsible AI oznacza, że użytkownik powinien wiedzieć, że rozmawia z AI?"

✅ Odpowiedź: Transparency (Przejrzystość).

Dlaczego?

Transparency oznacza, że AI nie powinno ukrywać swojej natury. Użytkownik powinien wiedzieć:

że rozmawia z AI, a nie z człowiekiem,
do czego AI służy,
jakie ma ograniczenia,
że odpowiedzi mogą nie być w 100% poprawne.
Przykład

✅ Dobra praktyka:

"Cześć! Jestem asystentem AI i pomagam odpowiadać na pytania."

❌ Zła praktyka:
AI udaje człowieka i nie informuje, że jest sztuczną inteligencją.

Inne podobne pytania egzaminacyjne:

Pytanie: Która zasada dotyczy ochrony danych osobowych?
➡️ Privacy & Security

Pytanie: Która zasada mówi o braku dyskryminacji?
➡️ Fairness

Pytanie: Która zasada oznacza, że AI powinno działać poprawnie i bezpiecznie?
➡️ Reliability & Safety

Pytanie: Która zasada mówi, że AI powinno być dostępne dla wszystkich użytkowników?
➡️ Inclusiveness

Pytanie: Kto odpowiada za decyzje AI?
➡️ Accountability

💡 Na AI-103 bardzo często pojawiają się właśnie takie pytania sytuacyjne, więc warto kojarzyć każdą zasadę z jednym charakterystycznym słowem:

Fairness → brak dyskryminacji
Reliability & Safety → bezpieczeństwo
Privacy & Security → ochrona danych
Inclusiveness → dostępność dla wszystkich
Transparency → użytkownik wie, że korzysta z AI
Accountability → odpowiedzialność człowieka lub organizacji
